name: Stable Kivy APK Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04 # Pinning to a highly stable LTS Linux environment

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure Git to bypass 403 errors
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Purge Broken Configuration Text
        run: |
          sed -i 's/^[ \t]*//' buildozer.spec
          sed -i 's/= 1/= true/g' buildozer.spec
          sed -i 's/= 0/= false/g' buildozer.spec
          sed -i 's/= True/= true/g' buildozer.spec
          sed -i 's/= False/= false/g' buildozer.spec

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Clean Old Broken Caches
        run: |
          rm -rf .buildozer/
          rm -rf ~/.buildozer/

      - name: Install Fundamental Compiler Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev xclip libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev
          sudo apt-get install -y openjdk-17-jdk unzip zip autoconf libtool pkg-config libncurses5-dev libncursesw5-dev libtinfo5 cmake libgmp3-dev

      - name: Lock Down Python Package Versions
        run: |
          pip install --upgrade pip
          # Pinning Cython below 3.0 prevents the missing jnius.c crash
          pip install "cython<3.0.0" virtualenv
          # Pinning buildozer to a stable 1.5.0 version handles older architectures cleanly
          pip install "buildozer==1.5.0"

      - name: Build Android APK
        run: |
          # This forces buildozer to handle the android SDK licenses quietly in the cloud
          yes | buildozer --verbose android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-kivy-apk
          path: bin/*.apk

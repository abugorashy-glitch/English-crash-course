name: Build Kivy APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # This locks down the exact environment versions to prevent compiler errors
    container:
      image: ghcr.io/misl7/docker-buildozer:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Clean out old bad caches that cause conflicting logs
      - name: Clear Old Cache Files
        run: |
          rm -rf .buildozer/
          rm -rf ~/.buildozer/

      - name: Build Android APK
        run: |
          buildozer --verbose android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-kivy-apk
          path: bin/*.apk
